    <style>

        body {

            font-family: 'Inter', sans-serif;

            background-color: #f8f9fa;

        }

        .leaflet-popup-content-wrapper {

            border-radius: 12px;

        }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }

        .fade-in-fast { animation: fadeIn 0.3s ease-in-out; }

        @keyframes fadeIn {

            from { opacity: 0; transform: translateY(10px); }

            to { opacity: 1; transform: translateY(0); }

        }

        .brand-gradient {

            background: linear-gradient(to right, #6366f1, #8b5cf6);

        }

        .shadow-elegant {

            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

        }

        .plan-card:hover {

            transform: translateY(-4px) scale(1.02);

            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.15), 0 10px 10px -5px rgba(99, 102, 241, 0.1);

        }

        /* Mobile Menu Transition */

        #mobile-menu {

            transition: transform 0.3s ease-in-out;

        }

        .slide-down { animation: slideDown 0.3s ease-out forwards; }

        @keyframes slideDown {

            from { opacity: 0; transform: translateY(-10px); }

            to { opacity: 1; transform: translateY(0); }

        }

        /* Chat scrollbar */

        .chat-scrollbar::-webkit-scrollbar { width: 4px; }

        .chat-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }

        .chat-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

        .chat-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .typing-indicator span {

            display: inline-block;

            width: 8px;

            height: 8px;

            border-radius: 50%;

            background-color: #6366f1;

            animation: bounce 1.4s infinite ease-in-out both;

        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }

        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {

            0%, 80%, 100% { transform: scale(0); }

            40% { transform: scale(1.0); }

        }

        /* Toggle Switch */

        .switch {

          position: relative;

          display: inline-block;

          width: 48px;

          height: 28px;

        }

        .switch input { display:none; }

        .slider {

          position: absolute;

          cursor: pointer;

          top: 0;

          left: 0;

          right: 0;

          bottom: 0;

          background-color: #ccc;

          transition: .4s;

          border-radius: 28px;

        }

        .slider:before {

          position: absolute;

          content: "";

          height: 20px;

          width: 20px;

          left: 4px;

          bottom: 4px;

          background-color: white;

          transition: .4s;

          border-radius: 50%;

        }

        input:checked + .slider { background-color: #6366f1; }

        input:checked + .slider:before { transform: translateX(20px); }

    </style>

                gymListView.classList.remove('hidden');

            function showMapView() {

                gymListView.classList.add('hidden');

                mapView.classList.remove('hidden');

                showMapBtn.classList.add('bg-indigo-600', 'text-white', 'shadow');

                showMapBtn.classList.remove('text-gray-600');

                showListBtn.classList.remove('bg-indigo-600', 'text-white', 'shadow');

                showListBtn.classList.add('text-gray-600');

                initMap();

                map.invalidateSize();

                updateGymDisplay();

            }



            function updateGymDisplay() {

                const rating = parseFloat(ratingFilter.value);

                const searchTerm = searchInput.value.trim().toLowerCase();

                let filteredGyms = [];



                if (searchTerm) {

                    filteredGyms = fuse.search(searchTerm).map(result => result.item);

                } else {

                    filteredGyms = [...gyms];

                }

                

                if (rating > 0) {

                    filteredGyms = filteredGyms.filter(gym => gym.rating >= rating);

                }



                // Separate sponsored from non-sponsored

                const sponsoredGyms = filteredGyms.filter(gym => gym.sponsored);

                const nonSponsoredGyms = filteredGyms.filter(gym => !gym.sponsored);



                // Sort non-sponsored gyms

                const sortBy = sortFilter.value;

                if (sortBy === 'price_asc') {

                    nonSponsoredGyms.sort((a, b) => a.pricing.monthly - b.pricing.monthly);

                } else if (sortBy === 'price_desc') {

                    nonSponsoredGyms.sort((a, b) => b.pricing.monthly - a.pricing.monthly);

                } else if (sortBy === 'best_value') {

                    // Higher rating and lower price is better. Score = rating / price. Sort descending.

                    nonSponsoredGyms.sort((a, b) => (b.rating / b.pricing.monthly) - (a.rating / a.pricing.monthly));

                }

                

                // Combine with sponsored gyms at the top

                const displayedGyms = [...sponsoredGyms, ...nonSponsoredGyms];



                renderGyms(displayedGyms);

            }

            

            // --- MAP FUNCTIONS ---

            function initMap() {

                if (map) return;

                map = L.map(mapElement).setView([12.9716, 77.5946], 11);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'

                }).addTo(map);

            }

            

            function updateMapMarkers(gymsToDisplay) {

                if (!map) return;

                markers.forEach(marker => map.removeLayer(marker));

                markers = [];



                gymsToDisplay.forEach(gym => {

                    const marker = L.marker([gym.lat, gym.lng]).addTo(map);

                    marker.bindPopup(`<div class="font-sans"><h3 class="font-bold text-lg">${gym.name}</h3><p>${gym.area}</p><p class="font-semibold">★ ${gym.rating}</p></div>`);

                    markers.push(marker);

                });

            }

                const photoThemes = ['fitness', 'workout', 'gym', 'lifting', 'running'];

                const randomTheme = photoThemes[Math.floor(Math.random() * photoThemes.length)];

                newMomentPhotoUrl = `https://placehold.co/600x400/1f2937/ffffff?text=${randomTheme}`;

            function handleNewMomentPost(type) {

                const captionInput = document.getElementById(`moment-caption-input-${type}`);

                const captionText = captionInput.value.trim();

                if (!captionText && !newMomentPhotoUrl) return;

                

                const uniqueId = Date.now();



                const newPost = {

                    author: userState.name,

                    text: captionText,

                    avatar: userState.name.split(' ').map(n => n[0]).join(''),

                    image: newMomentPhotoUrl,

                    timestamp: "Just now",

                    sponsored: false,

                    id: uniqueId

                };



                if (type === 'gym' && userState.subscribedGymId) {

                    gymCommunityData[userState.subscribedGymId].posts.unshift(newPost);

                    document.getElementById('gym-post-moment-form').classList.add('hidden');

                    renderGymCommunityView(); 

                } else if (type === 'global') {

                    globalCommunityData.posts.unshift(newPost);

                    document.getElementById('global-post-moment-form').classList.add('hidden');

                    renderGlobalCommunityView();

                }

                

                newMomentPhotoUrl = null; 

                captionInput.value = '';

                    if (type === 'global') {

                        globalCommunityData.posts = globalCommunityData.posts.filter(p => p.id !== parseInt(postId));

                        renderGlobalCommunityView();

                    } else if (type === 'gym') {

                        gymCommunityData[userState.subscribedGymId].posts = gymCommunityData[userState.subscribedGymId].posts.filter(p => p.timestamp !== postId);

                        renderGymCommunityView();

                    }

                    return "A good rule of thumb for protein intake is about 1.6-2.2 grams per kilogram of body weight if you're active. Sources like chicken, fish, eggs, and legumes are excellent choices.";

                } else if (input.includes('bicep')) {

                    return "For bigger biceps, focus on variety and form. Include exercises like Barbell Curls for mass, Incline Dumbbell Curls for the long head, and Hammer Curls for the brachialis and forearm. Aim for 3-4 sets of 8-12 reps.";

                } else if (input.includes('tricep')) {

                    return "Triceps make up about 2/3 of your upper arm mass! Don't neglect them. Great exercises include Cable Pushdowns, Skull Crushers (lying tricep extensions), and Overhead Dumbbell Extensions. Close-grip bench presses are also fantastic for building mass.";

                } else if (input.includes('abs') || input.includes('core')) {

                    return "A strong core is key! For abs, include a mix of exercises. Crunches and leg raises target the upper and lower rectus abdominis. Planks are excellent for transverse abdominis (deep core stability). Russian twists work the obliques. Remember, visible abs are also highly dependent on low body fat.";

                } else if (input.includes('leg') || input.includes('squat') || input.includes('quads') || input.includes('hamstrings')) {

                    return "Never skip leg day! A balanced leg workout hits all major muscles. Barbell Squats are king for overall leg development. Romanian Deadlifts target the hamstrings and glutes. Leg Press is great for quads, and Calf Raises will build your calves. Lunges are also a fantastic unilateral exercise for stability and strength.";

                } else if (input.includes('cardio')) {

                    return "For cardiovascular health, aim for at least 150 minutes of moderate-intensity activity (like brisk walking or cycling) or 75 minutes of vigorous-intensity activity (like running) per week. Mixing steady-state cardio with HIIT (High-Intensity Interval Training) can be very effective for improving endurance and burning fat.";

                } else if (input.includes('lose weight') || input.includes('fat loss')) {

                    return "Weight loss is primarily about a consistent calorie deficit. Combining regular strength training to build muscle (which boosts your metabolism) and a balanced diet is a very effective strategy. Don't forget to get enough sleep and manage stress, as they also play a big role!";

                }

                return "That's a great question. While I'm still learning, I'd recommend consulting with a certified personal trainer for personalized advice on that topic. They can create a plan tailored specifically for you.";

            }



            function handleAiCoachMessage() {

                const inputEl = document.getElementById('ai-chat-input');

                const userInput = inputEl.value.trim();

                if (!userInput) return;



                aiChatHistory.push({ sender: 'user', text: userInput });

                aiChatHistory.push({ sender: 'typing' });

                renderAiChatMessages();

                inputEl.value = '';



                setTimeout(() => {

                    const aiText = getAiResponse(userInput);

                    aiChatHistory.pop(); // Remove typing indicator

                    aiChatHistory.push({ sender: 'ai', text: aiText });

                    renderAiChatMessages();

                }, 1500);

            }



            function addCardClickListeners() {

                document.querySelectorAll('[data-gym-id]').forEach(card => {

                    card.addEventListener('click', (e) => {

                        const gymId = parseInt(card.dataset.gymId);

                        openModal(gymId);

                    });

                });

            }



            // --- MOBILE MENU ---

            function toggleMobileMenu(show) {

                if (show) {

                    mobileMenu.classList.remove('-translate-x-full');

                } else {

                    mobileMenu.classList.add('-translate-x-full');

                }

            }



            // --- EVENT LISTENERS ---

            ratingFilter.addEventListener('input', updateGymDisplay);

            searchInput.addEventListener('input', updateGymDisplay);

            sortFilter.addEventListener('input', updateGymDisplay);

            showListBtn.addEventListener('click', showListView);

            showMapBtn.addEventListener('click', showMapView);

            homeBtn.addEventListener('click', showHomeView);



            // Desktop Nav

            homeNavBtn.addEventListener('click', (e) => { e.preventDefault(); showHomeView(); });

            gymCommunityNavBtn.addEventListener('click', (e) => { e.preventDefault(); showGymCommunityView(); });

            globalCommunityNavBtn.addEventListener('click', (e) => { e.preventDefault(); showGlobalCommunityView(); });

            aiCoachNavBtn.addEventListener('click', (e) => { e.preventDefault(); showAiCoachView(); });

            profileNavBtn.addEventListener('click', (e) => { e.preventDefault(); showProfileView(); });

            

            // Mobile Nav

            mobileMenuBtn.addEventListener('click', () => toggleMobileMenu(true));

            closeMobileMenuBtn.addEventListener('click', () => toggleMobileMenu(false));

            

            [mobileHomeNavBtn, mobileGymCommunityNavBtn, mobileGlobalCommunityNavBtn, mobileAiCoachNavBtn, mobileProfileNavBtn].forEach(btn => {

                btn.addEventListener('click', (e) => {

                    e.preventDefault();

                    const targetId = e.target.id;

                    if(targetId.includes('home')) showHomeView();

                    else if(targetId.includes('gym')) showGymCommunityView();

                    else if(targetId.includes('global')) showGlobalCommunityView();

                    else if(targetId.includes('ai-coach')) showAiCoachView();

                    else if(targetId.includes('profile')) showProfileView();

                    toggleMobileMenu(false);

                });

            });

            

            modal.addEventListener('click', (e) => {

                if (e.target === modal) closeModal();

            });



            // --- INITIAL RENDER ---

            updateGymDisplay();



        });

    </script>

</body>
